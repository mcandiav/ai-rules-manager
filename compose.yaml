name: ai-rules-manager

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "${API_PORT:-8002}:8000"
    volumes:
      - ./data:/data
      - ./Reglas Estandar:/Reglas Estandar:ro
    environment:
      - API_PORT=8000
      - SQLITE_PATH=/data/sqlite/rules-manager.db
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-30000}
      - NODE_ENV=${NODE_ENV:-production}
      - STANDARD_RULES_PATH=/Reglas Estandar
      - HOST_HOME_ROOT=${HOST_HOME_ROOT:-}
      - HOST_DRIVE_MAPPINGS=${HOST_DRIVE_MAPPINGS:-}
    healthcheck:
      test: ["CMD", "node", "--eval", "fetch('http://localhost:8000/health').then(r => {if(!r.ok)process.exit(1)}).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "${WEB_PORT:-3002}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
